# fly.toml — Fly.io app configuration for PRISM backend
# WHY: Fly.io runs our Docker container 24/7 on free tier with no cold sleep.

app = "prism-backend"
primary_region = "sin"  # Singapore — closest to India

[build]
  dockerfile = "Dockerfile"

# Mount a persistent volume for SQLite DB and RAG index
[mounts]
  source = "prism_data"
  destination = "/app/data"

[env]
  ENVIRONMENT = "production"
  DATABASE_URL = "sqlite:////app/data/prism_prod.db"
  REDIS_HOST = "localhost"
  PORT = "8000"

[[services]]
  internal_port = 8000
  protocol = "tcp"

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [services.http_checks]
    interval = "30s"
    timeout = "10s"
    grace_period = "20s"
    method = "GET"
    path = "/api/health"

[vm]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
